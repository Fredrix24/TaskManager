<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout}">
<div th:fragment="content">
    <h1>Задачи</h1>
    <table>
        <tr><th>ID</th><th>Название</th><th>Приоритет</th><th>Статус</th><th>Действия</th></tr>
        <tr th:each="task : ${tasks}">
            <td th:text="${task.id}">1</td>
            <td th:text="${task.title}">Задача</td>
            <td th:text="${task.priority}">HIGH</td>
            <td th:text="${task.status}">NEW</td>
            <td>
                <a th:href="@{/web/tasks/{id}/edit(id=${task.id})}" class="btn">Редактировать</a>
                <form th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
                      th:action="@{/web/tasks/{id}/delete(id=${task.id})}"
                      method="post" style="display:inline;">
                    <button class="btn btn-delete" onclick="return confirm('Удалить?')">Удалить</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(tasks)}"><td colspan="5">Нет задач</td></tr>
    </table>
</div>
</html>
