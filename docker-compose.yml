services:
  postgres:
    image: postgres:16-alpine
    container_name: taskapi-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taskdb}
      POSTGRES_USER: ${POSTGRES_USER:-taskuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskpass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskuser} -d ${POSTGRES_DB:-taskdb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: taskapi-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-taskdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-taskuser}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-taskpass}
      JWT_SECRET: ${JWT_SECRET:-devSecret12345678901234567890123456}
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: